version: "3.9"

services:
  db:
    image: khaller/graphdb-free:10.0.0
    container_name : graphdb-database
    command: ["--GDB_HEAP_SIZE", "4GB"]
    ports:
      - 7200:7200
      - 7300:7300
    volumes:
      - "./config:/repository.init/NBA-CPS:rw"
      - "./serialization/appearance_game_join.ttl:/repository.init/NBA-CPS/toLoad/appearance_game_join.ttl:ro"
      - "./serialization/appearance0.ttl:/repository.init/NBA-CPS/toLoad/appearance0.ttl:ro"
      - "./serialization/appearance1.ttl:/repository.init/NBA-CPS/toLoad/appearance1.ttl:ro"
      - "./serialization/appearance2.ttl:/repository.init/NBA-CPS/toLoad/appearance2.ttl:ro"
      - "./serialization/appearance3.ttl:/repository.init/NBA-CPS/toLoad/appearance3.ttl:ro"
      - "./serialization/arena.ttl:/repository.init/NBA-CPS/toLoad/arena.ttl:ro"
      - "./serialization/club_arena_join.ttl:/repository.init/NBA-CPS/toLoad/club_arena_join.ttl:ro"
      - "./serialization/club.ttl:/repository.init/NBA-CPS/toLoad/club.ttl:ro"
      - "./serialization/country.ttl:/repository.init/NBA-CPS/toLoad/country.ttl:ro"
      - "./serialization/game_club_join.ttl:/repository.init/NBA-CPS/toLoad/game_club_join.ttl:ro"
      - "./serialization/game.ttl:/repository.init/NBA-CPS/toLoad/game.ttl:ro"
      - "./serialization/person_country_join.ttl:/repository.init/NBA-CPS/toLoad/person_country_join.ttl:ro"
      - "./serialization/person_player_join.ttl:/repository.init/NBA-CPS/toLoad/person_player_join.ttl:ro"
      - "./serialization/person.ttl:/repository.init/NBA-CPS/toLoad/person.ttl:ro"
      - "./serialization/player_appearance_join.ttl:/repository.init/NBA-CPS/toLoad/player_appearance_join.ttl:ro"
      - "./serialization/player_club_join.ttl:/repository.init/NBA-CPS/toLoad/player_club_join.ttl:ro"
      - "./serialization/player.ttl:/repository.init/NBA-CPS/toLoad/player.ttl:ro"     
      - "./ontology/ontology.owl:/ontology/ontology.owl:ro"
      - "./db/data:/opt/graphdb/data:rw"
      - "./db/logs:/opt/graphdb/logs:rw"
      - "./db/work:/opt/graphdb/work:rw"



  backend:
    ports:
      - 8080:8080
    build:
      context: .
      dockerfile: Dockerfile_Backend
      
